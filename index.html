<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Stock Prediction Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:25px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:40px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

th{
background:#1e293b;
}

.buy{color:#22c55e;font-weight:bold}
.sell{color:#ef4444;font-weight:bold}
.hold{color:#facc15;font-weight:bold}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

</style>

</head>

<body>

<h1>📈 Stock Prediction Dashboard</h1>

<div class="card">

<table id="summary">

<thead>

<tr>
<th>Ticker</th>
<th>Last Price</th>
<th>Predicted Price</th>
<th>Change %</th>
<th>Confidence</th>
<th>Signal</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="card">
<canvas id="priceChart"></canvas>
</div>

<script>

const apiURL="https://script.google.com/macros/s/AKfycbwdlxa5SUiIXSy9y3BPalV1TrOFTKr9foUyOgNdF8qVAp3OZnFSxA39scbGbHYyTmAM/exec"

async function loadData(){

const res=await fetch(apiURL)

const data=await res.json()

const table=document.querySelector("#summary tbody")

let prices=[]
let predictions=[]
let dates=[]

data.forEach(row=>{

let close=parseFloat(row.Close)
let predicted=parseFloat(row.PredictedPrice)

let change=((predicted-close)/close*100).toFixed(2)

let signal="HOLD"
let signalClass="hold"

if(change>3){
signal="BUY"
signalClass="buy"
}

if(change<-3){
signal="SELL"
signalClass="sell"
}

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${row.Ticker}</td>
<td>${close}</td>
<td>${predicted}</td>
<td>${change}%</td>
<td>${row.Confidence}</td>
<td class="${signalClass}">${signal}</td>
`

table.appendChild(tr)

dates.push(row.Date)
prices.push(close)
predictions.push(predicted)

})

drawChart(dates,prices,predictions)

}

function drawChart(dates,prices,predictions){

new Chart(document.getElementById("priceChart"),{

type:'line',

data:{
labels:dates,

datasets:[

{
label:"Historical Price",
data:prices,
borderColor:"#38bdf8",
backgroundColor:"transparent"
},

{
label:"Predicted Price",
data:predictions,
borderColor:"#22c55e",
borderDash:[6,6],
backgroundColor:"transparent"
}

]

}

})

}

loadData()

</script>

</body>

</html>
