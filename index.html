<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#chatbox{
width:400px;
margin:auto;
background:#222;
padding:20px;
border-radius:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h1>🤖 AI Sheet Chatbot</h1>

<div id="chatbox">
<div id="messages"></div>

<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

const SHEET_API="YOUR_GOOGLE_SCRIPT_URL";

async function sendMessage(){

let input=document.getElementById("userInput").value;

let response=await fetch(SHEET_API);
let data=await response.json();

let reply="I don't know that yet.";

data.forEach(item=>{
if(input.toLowerCase().includes(item.question.toLowerCase())){
reply=item.answer;
}
});

document.getElementById("messages").innerHTML+=
"<p><b>You:</b> "+input+"</p>";

document.getElementById("messages").innerHTML+=
"<p><b>Bot:</b> "+reply+"</p>";

}

</script>

</body>
</html>
